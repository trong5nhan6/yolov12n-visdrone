# =============================================================================
# Base Training Configuration — YOLOv12n VisDrone
# Tất cả config experiment kế thừa và override file này
# =============================================================================

# ── Model ────────────────────────────────────────────────────────────────────
model: yolov12n          # model key trong MODEL_REGISTRY (models/__init__.py)
idea: baseline           # idea key: baseline | cagi | amsha | rsfe | cgsr | iawr
pretrained: yolo12n.pt   # pretrained weights; đặt null để train from scratch

# ── Dataset ──────────────────────────────────────────────────────────────────
data: configs/visdrone.yaml   # đường dẫn tới dataset config
img_size: 640                 # kích thước ảnh đầu vào (pixels)

# ── Training Hyperparameters ─────────────────────────────────────────────────
epochs: 100
batch_size: 16
workers: 8
optimizer: SGD          # SGD | Adam | AdamW | auto
lr0: 0.01               # learning rate khởi đầu
lrf: 0.01               # lr cuối = lr0 * lrf
momentum: 0.937
weight_decay: 0.0005

# Warmup
warmup_epochs: 3
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# ── Augmentation — tuned for VisDrone (small + dense + aerial view) ──────────
hsv_h: 0.015       # hue jitter nhẹ
hsv_s: 0.7         # saturation jitter
hsv_v: 0.4         # brightness jitter
degrees: 0.0       # không rotate — drone view có hướng cố định
translate: 0.2     # tăng từ 0.1: thêm positional variation
scale: 0.9         # tăng từ 0.5: scale jitter mạnh → model thấy object nhỏ ở nhiều kích thước
shear: 0.0
perspective: 0.0
flipud: 0.5        # tăng từ 0.0: drone không có up/down cố định → flip dọc hợp lệ
fliplr: 0.5        # unchanged
mosaic: 1.0        # giữ nguyên — quan trọng nhất với small objects
mixup: 0.1         # tăng từ 0.0: blend 2 ảnh nhẹ giúp generalize
copy_paste: 0.3    # tăng từ 0.0: copy objects sang ảnh khác → tăng density training
close_mosaic: 20   # tăng từ 10: giữ mosaic lâu hơn trước khi tắt

# ── Validation & Testing ──────────────────────────────────────────────────────
val_split: val              # split dùng để validate sau mỗi epoch
test_split: test            # split dùng để test định kỳ
test_every_n_epochs: 10     # chạy test sau mỗi N epoch (0 = không test)
save_period: 10             # lưu checkpoint mỗi N epoch (-1 = chỉ lưu best/last)
conf_thres: 0.001           # confidence threshold khi val/test
iou_thres: 0.6              # NMS IoU threshold

# ── Device & Precision ───────────────────────────────────────────────────────
device: ""      # "" = auto-detect (cuda nếu có, ngược lại cpu)
half: false     # FP16 inference (chỉ dùng trên GPU)

# ── Logging & Output ─────────────────────────────────────────────────────────
project: runs
name: exp
exist_ok: false   # true = ghi đè run cũ cùng tên
verbose: true
plots: true       # vẽ confusion matrix, PR curve,...

# ── Idea-specific Parameters ─────────────────────────────────────────────────
# CAGI
cagi_easy_threshold: 0.4      # complexity score < this → EASY path
cagi_hard_threshold: 0.7      # complexity score > this → HARD path
cagi_scp_hidden_dim: 64       # hidden dim của Scene Complexity Predictor
cagi_budget_lambda: 0.1       # trọng số của compute budget loss

# AMSHA
amsha_threshold: 0.5          # SOEP score > this → bật P2 head
amsha_conservative: true      # true = dùng threshold thấp hơn để an toàn

# RSFE
rsfe_topk_ratio: 0.25         # tỷ lệ vị trí được enhance (0.25 = top 25%)
rsfe_adaptive_k: false        # true = K thay đổi theo complexity

# CGSR
cgsr_conf_threshold: 0.6      # confidence < this → uncertain region
cgsr_patch_size: 160          # kích thước patch khi re-detect
cgsr_max_patches: 3           # số patch tối đa tái xử lý mỗi ảnh

# IAWR
iawr_width_options: [0.5, 0.75, 1.0]   # width multipliers
iawr_router_img_size: 128              # router chạy trên ảnh resize này
iawr_router_backbone: mobilenetv3_small
